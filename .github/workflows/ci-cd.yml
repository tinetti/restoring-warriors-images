name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha

  deploy-config:
    runs-on: ubuntu-latest
    outputs:
      has_deploy_token: ${{ steps.check.outputs.has_deploy_token }}
    steps:
      - id: check
        env:
          DEVOPS_WORKFLOW_TOKEN: ${{ secrets.DEVOPS_WORKFLOW_TOKEN }}
        run: |
          if [ -n "$DEVOPS_WORKFLOW_TOKEN" ]; then
            echo "has_deploy_token=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_deploy_token=false" >> "$GITHUB_OUTPUT"
          echo "::warning::DEVOPS_WORKFLOW_TOKEN is not configured; deployment dispatch jobs will be skipped."

  deploy-dev:
    needs: [ci, deploy-config]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy-config.outputs.has_deploy_token == 'true'
    runs-on: ubuntu-latest
    env:
      INFRA_REPO: tinetti/devops-tools
    steps:
      - name: Dispatch dev deployment
        env:
          GITHUB_TOKEN: ${{ secrets.DEVOPS_WORKFLOW_TOKEN }}
        run: |
          response_file=$(mktemp)
          http_code=$(curl -sS -o "$response_file" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${INFRA_REPO}/actions/workflows/deploy-dev.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"app_name\":\"restoring-warriors-images\",\"tag\":\"${GITHUB_SHA}\"}}")

          if [ "$http_code" != "204" ]; then
            echo "GitHub workflow dispatch failed with HTTP $http_code"
            cat "$response_file"
            exit 1
          fi

          echo "Dev deployment dispatch accepted."

  deploy-dev-skipped:
    needs: [ci, deploy-config]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy-config.outputs.has_deploy_token != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped dev deployment
        run: |
          echo "DEVOPS_WORKFLOW_TOKEN is not configured in this repository."
          echo "Add a fine-grained token that can dispatch workflows in tinetti/devops-tools to enable dev deployments."

  deploy-prod:
    needs: [ci, deploy-config]
    if: startsWith(github.ref, 'refs/tags/v') && needs.deploy-config.outputs.has_deploy_token == 'true'
    runs-on: ubuntu-latest
    env:
      INFRA_REPO: tinetti/devops-tools
    steps:
      - name: Dispatch prod deployment
        env:
          GITHUB_TOKEN: ${{ secrets.DEVOPS_WORKFLOW_TOKEN }}
        run: |
          response_file=$(mktemp)
          http_code=$(curl -sS -o "$response_file" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${INFRA_REPO}/actions/workflows/deploy-prod.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"app_name\":\"restoring-warriors-images-prod\",\"tag\":\"${GITHUB_REF_NAME}\"}}")

          if [ "$http_code" != "204" ]; then
            echo "GitHub workflow dispatch failed with HTTP $http_code"
            cat "$response_file"
            exit 1
          fi

          echo "Production deployment dispatch accepted."

  deploy-prod-skipped:
    needs: [ci, deploy-config]
    if: startsWith(github.ref, 'refs/tags/v') && needs.deploy-config.outputs.has_deploy_token != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped prod deployment
        run: |
          echo "DEVOPS_WORKFLOW_TOKEN is not configured in this repository."
          echo "Add a fine-grained token that can dispatch workflows in tinetti/devops-tools to enable production deployments."
